project: magpie
region: us-west1

services:
  server:
    provider: railway
    runtime: python
    source: .
    start: "magpie serve"
    health_check: /health
    env:
      DATABASE_URL: "${{postgres.url}}"
      OPENAI_API_KEY: "${{env.OPENAI_API_KEY}}"
      API_KEY: "${{env.API_KEY}}"
      RESEND_API_KEY: "${{env.RESEND_API_KEY}}"
      RESEND_FROM: "magpie <hi@magpie.erdo.ai>"
      SESSION_SECRET: "${{env.SESSION_SECRET}}"

databases:
  postgres:
    provider: railway
    plugin: postgres
    extensions: [pgvector]

domain:
  server:
    host: magpie.erdo.ai
